<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Dosyaları Toplam Raporu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2em;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 3px dashed #007bff;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            background: #e3f2fd;
            border-color: #0056b3;
        }
        
        .file-input {
            display: none;
        }
        
        .upload-btn {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .upload-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .process-btn {
            background: #28a745;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: none;
            margin: 20px auto;
            transition: all 0.3s ease;
        }
        
        .process-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }
        
        .process-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .download-btn {
            background: #fd7e14;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            margin: 20px auto;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background: #e8590c;
            transform: translateY(-2px);
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-item {
            background: #e9ecef;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .progress {
            width: 100%;
            height: 25px;
            background: #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(45deg, #007bff, #28a745);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 12px;
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .summary-table th, .summary-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        
        .summary-table th {
            background: #007bff;
            color: white;
            font-weight: bold;
        }
        
        .summary-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .summary-table tr:hover {
            background: #e3f2fd;
        }
        
        .status {
            margin: 15px 0;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b8daff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel Dosyaları Toplam Raporu Oluşturucu</h1>
        
        <div class="upload-section">
            <h3>📁 Excel Dosyalarınızı Seçin</h3>
            <p>Aynı formattaki tüm Excel dosyalarını birden seçebilirsiniz</p>
            <input type="file" id="fileInput" class="file-input" multiple accept=".xlsx,.xls">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                Dosyaları Seç
            </button>
            <div class="file-list" id="fileList"></div>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <button class="process-btn" id="processBtn" onclick="processFiles()">
            🚀 Dosyaları İşle ve Rapor Oluştur
        </button>
        
        <button class="download-btn" id="downloadBtn" onclick="downloadReport()">
            📥 Raporu İndir
        </button>
        
        <div class="results" id="results">
            <h3>📈 İşleme Sonuçları</h3>
            <div id="summaryInfo"></div>
            <table class="summary-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>Tedarikçi Kodu</th>
                        <th>Tedarikçi Adı</th>
                        <th>Toplam Miktar</th>
                        <th>Birim</th>
                        <th>Kayıt Sayısı</th>
                    </tr>
                </thead>
                <tbody id="summaryBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let processedData = [];
        let summaryData = [];
        
        // Dosya seçimi
        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            displaySelectedFiles();
        });
        
        function displaySelectedFiles() {
            const fileList = document.getElementById('fileList');
            const processBtn = document.getElementById('processBtn');
            
            if (selectedFiles.length > 0) {
                fileList.innerHTML = '<h4>Seçilen Dosyalar:</h4>';
                selectedFiles.forEach(file => {
                    fileList.innerHTML += `
                        <div class="file-item">
                            <span>${file.name}</span>
                            <span>${(file.size / 1024).toFixed(1)} KB</span>
                        </div>
                    `;
                });
                processBtn.style.display = 'block';
            } else {
                fileList.innerHTML = '';
                processBtn.style.display = 'none';
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function updateProgress(percent) {
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            progress.style.display = 'block';
            progressBar.style.width = percent + '%';
        }
        
        async function processFiles() {
            const processBtn = document.getElementById('processBtn');
            processBtn.disabled = true;
            processBtn.textContent = 'İşleniyor...';
            
            processedData = [];
            const supplierTotals = {};
            
            showStatus('Dosyalar okunuyor...', 'info');
            updateProgress(0);
            
            try {
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    showStatus(`İşleniyor: ${file.name} (${i + 1}/${selectedFiles.length})`, 'info');
                    
                    const data = await readExcelFile(file);
                    if (data && data.length > 0) {
                        data.forEach(row => {
                            const supplierCode = row['Tedarikçi Kodu'];
                            const supplier = row['Tedarikçi'];
                            const quantity = parseFloat(row['Miktar']) || 0;
                            const unit = row['Birim'];
                            
                            if (supplierCode && quantity > 0) {
                                const key = supplierCode;
                                
                                if (!supplierTotals[key]) {
                                    supplierTotals[key] = {
                                        supplierCode: supplierCode,
                                        supplier: supplier || '',
                                        totalQuantity: 0,
                                        unit: unit || '',
                                        recordCount: 0
                                    };
                                }
                                
                                supplierTotals[key].totalQuantity += quantity;
                                supplierTotals[key].recordCount += 1;
                                
                                // Birim bilgisini güncelle (en son bulunanı kullan)
                                if (unit && unit.trim() !== '') {
                                    supplierTotals[key].unit = unit;
                                }
                                
                                // Tedarikçi adını güncelle (en son bulunanı kullan)
                                if (supplier && supplier.trim() !== '') {
                                    supplierTotals[key].supplier = supplier;
                                }
                            }
                        });
                    }
                    
                    updateProgress(((i + 1) / selectedFiles.length) * 100);
                }
                
                // Sonuçları diziye çevir
                summaryData = Object.values(supplierTotals).sort((a, b) => 
                    b.totalQuantity - a.totalQuantity
                );
                
                displayResults();
                showStatus(`✅ İşlem tamamlandı! ${summaryData.length} farklı tedarikçi kodu bulundu.`, 'success');
                
                document.getElementById('downloadBtn').style.display = 'block';
                
            } catch (error) {
                console.error('Hata:', error);
                showStatus(`❌ Hata: ${error.message}`, 'error');
            }
            
            processBtn.disabled = false;
            processBtn.textContent = '🚀 Dosyaları İşle ve Rapor Oluştur';
        }
        
        function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        // İlk worksheet'i al
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // 10. satırdan başlayarak veriyi oku
                        const range = XLSX.utils.decode_range(worksheet['!ref']);
                        range.s.r = 9; // 10. satır (0-indexed, bu yüzden 9)
                        
                        const newRef = XLSX.utils.encode_range(range);
                        const adjustedWorksheet = {};
                        
                        // Sadece belirtilen aralıktaki hücreleri kopyala
                        for (let R = range.s.r; R <= range.e.r; ++R) {
                            for (let C = range.s.c; C <= range.e.c; ++C) {
                                const cellAddress = XLSX.utils.encode_cell({c: C, r: R});
                                if (worksheet[cellAddress]) {
                                    adjustedWorksheet[cellAddress] = worksheet[cellAddress];
                                }
                            }
                        }
                        adjustedWorksheet['!ref'] = newRef;
                        
                        // JSON'a çevir
                        const jsonData = XLSX.utils.sheet_to_json(adjustedWorksheet, {
                            header: ['No', 'Intema Kodu', 'Tedarikçi Kodu', 'Tiger Kod', 'Tedarikçi', 
                                   'Açıklama', 'Miktar', 'Birim', 'Montaj Pakeri', 'Malzeme', 'Renk', 'Malzeme Termin'],
                            range: 1 // İlk satırı başlık olarak kullan
                        });
                        
                        resolve(jsonData);
                    } catch (error) {
                        reject(new Error(`${file.name} dosyası okunurken hata: ${error.message}`));
                    }
                };
                reader.onerror = () => reject(new Error(`${file.name} dosyası okunamadı`));
                reader.readAsArrayBuffer(file);
            });
        }
        
        function displayResults() {
            const results = document.getElementById('results');
            const summaryBody = document.getElementById('summaryBody');
            const summaryInfo = document.getElementById('summaryInfo');
            
            // Özet bilgiler
            const totalQuantity = summaryData.reduce((sum, item) => sum + item.totalQuantity, 0);
            const totalRecords = summaryData.reduce((sum, item) => sum + item.recordCount, 0);
            
            summaryInfo.innerHTML = `
                <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <strong>📊 Genel Özet:</strong><br>
                    • Toplam Tedarikçi Sayısı: ${summaryData.length}<br>
                    • Toplam Kayıt Sayısı: ${totalRecords}<br>
                    • Toplam Miktar: ${totalQuantity.toLocaleString('tr-TR', {maximumFractionDigits: 2})}
                </div>
            `;
            
            // Tablo verilerini doldur
            summaryBody.innerHTML = '';
            summaryData.forEach(item => {
                const row = summaryBody.insertRow();
                row.innerHTML = `
                    <td>${item.supplierCode}</td>
                    <td>${item.supplier}</td>
                    <td style="text-align: right; font-weight: bold;">
                        ${item.totalQuantity.toLocaleString('tr-TR', {maximumFractionDigits: 2})}
                    </td>
                    <td>${item.unit}</td>
                    <td style="text-align: center;">${item.recordCount}</td>
                `;
            });
            
            results.style.display = 'block';
        }
        
        function downloadReport() {
            try {
                // Yeni workbook oluştur
                const wb = XLSX.utils.book_new();
                
                // Özet sayfası için veri hazırla
                const summarySheetData = [
                    ['Tedarikçi Toplam Raporu'],
                    ['Oluşturulma Tarihi: ' + new Date().toLocaleDateString('tr-TR')],
                    [''],
                    ['Tedarikçi Kodu', 'Tedarikçi Adı', 'Toplam Miktar', 'Birim', 'Kayıt Sayısı']
                ];
                
                summaryData.forEach(item => {
                    summarySheetData.push([
                        item.supplierCode,
                        item.supplier,
                        item.totalQuantity,
                        item.unit,
                        item.recordCount
                    ]);
                });
                
                // Worksheet oluştur
                const ws = XLSX.utils.aoa_to_sheet(summarySheetData);
                
                // Sütun genişliklerini ayarla
                ws['!cols'] = [
                    {wch: 15}, // Tedarikçi Kodu
                    {wch: 30}, // Tedarikçi Adı
                    {wch: 15}, // Toplam Miktar
                    {wch: 10}, // Birim
                    {wch: 12}  // Kayıt Sayısı
                ];
                
                // Worksheet'i workbook'a ekle
                XLSX.utils.book_append_sheet(wb, ws, 'Tedarikçi Toplamları');
                
                // Dosyayı indir
                const fileName = `Tedarikci_Toplam_Raporu_${new Date().toISOString().slice(0,10)}.xlsx`;
                XLSX.writeFile(wb, fileName);
                
                showStatus('✅ Rapor başarıyla indirildi!', 'success');
            } catch (error) {
                console.error('İndirme hatası:', error);
                showStatus('❌ Rapor indirirken hata oluştu: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
